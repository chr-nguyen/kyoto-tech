name: Deploy GitHub Pages Redirect

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/redirect-site/**
      - .github/workflows/deploy-github-pages-redirect.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-redirect
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload redirect artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .github/redirect-site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy redirect to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
